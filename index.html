<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Sword & Supper gear and resource drop viewer">
  <title>Sword & Supper — Gear & Resource Viewer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game-bg" aria-hidden="true"></div>
  <div class="game-dim" aria-hidden="true"></div>

  <main class="page">
    <section class="inventory-shell" id="inventoryShell">
      <header class="header">
        <div>
          <div class="header-title">Gear & Resources</div>
          <div class="load-status loading" id="status">Loading latest game data…</div>
        </div>
        <button class="close-button" id="minimizeButton" title="Minimize" aria-label="Minimize">X</button>
      </header>

      <nav class="category-nav" aria-label="Viewer category">
        <button class="category-button active" data-view="gear" title="Gear">
          <img src="https://cabbageidle-eimoap-0-0-85-webview.devvit.net/assets/ui/inventory/PictoIcon_Sword_2.png" alt="">
          <span>Gear</span>
        </button>
        <button class="category-button" data-view="resources" title="Resources">
          <img src="https://cabbageidle-eimoap-0-0-85-webview.devvit.net/assets/ui/inventory/PictoIcon_Wood.png" alt="">
          <span>Resources</span>
        </button>
      </nav>

      <nav class="filter-nav" id="filters" aria-label="Filters"></nav>

      <div class="inventory-body">
        <div class="controls">
          <div class="search-wrap"><input id="searchInput" placeholder="Search gear…" autocomplete="off"></div>
          <button class="sort-button" id="sortButton">Sort: Level</button>
        </div>
        <div class="result-summary" id="summary">Preparing database…</div>
        <div class="item-grid" id="itemGrid"><div class="empty-message">Loading…</div></div>
      </div>

      <footer class="bottom-bar" aria-hidden="true">
        <img class="bottom-icon" src="https://cabbageidle-eimoap-0-0-85-webview.devvit.net/assets/ui/inventory/PictoIcon_Blueprint.png" alt="">
        <img class="bottom-icon" src="https://cabbageidle-eimoap-0-0-85-webview.devvit.net/assets/ui/inventory/PictoIcon_Map_2.png" alt="">
        <img class="bottom-icon" src="https://cabbageidle-eimoap-0-0-85-webview.devvit.net/assets/ui/inventory/PictoIcon_Sword_2.png" alt="">
        <img class="bottom-icon" src="https://cabbageidle-eimoap-0-0-85-webview.devvit.net/assets/ui/inventory/PictoIcon_Wood.png" alt="">
      </footer>
    </section>
  </main>

  <div class="detail-overlay" id="detailOverlay">
    <article class="item-modal" id="itemModal" role="dialog" aria-modal="true" aria-labelledby="modalName">
      <button class="detail-close" id="detailClose" aria-label="Close">X</button>
      <div class="item-modal-header" id="modalHeader">
        <div class="modal-name" id="modalName"></div>
        <div class="modal-rarity" id="modalRarity"></div>
        <div class="modal-icon" id="modalIcon"></div>
        <div class="modal-min-level" id="modalLevel"></div>
      </div>
      <div class="level-selector" id="levelSelector"></div>
      <div class="item-modal-body" id="modalBody"></div>
    </article>
  </div>

  <aside class="about-me">
    <strong>About me</strong>
    Just a doctor trying these codey majiggies.<br>
    Reddit: <a href="https://www.reddit.com/user/quicknfresh/" target="_blank" rel="noopener">@quicknfresh</a><br>
    GitHub: <a href="https://github.com/quicknfresh" target="_blank" rel="noopener">quicknfresh</a>
  </aside>

  <script src="app.js"></script>
</body>
</html>
