.game-dim{position:fixed;inset:0;z-index:1;background:rgba(0,0,0,.55);pointer-events:none}
.page{position:relative;z-index:2;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:12px}
.inventory-shell{
  width:min(500px,100%);
  height:min(95vh,760px);
  min-height:620px;
  display:flex;
  flex-direction:column;
  background:var(--nav-dark);
  border:3px solid #000;
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 10px 24px rgba(0,0,0,.7);
  position:relative;
  transform-origin:center top;
}
.inventory-shell.minimized{height:58px;min-height:58px}
.inventory-shell.minimized .inventory-body,
.inventory-shell.minimized .category-nav,
.inventory-shell.minimized .filter-nav{display:none}
.header{
  min-height:58px;
  background:linear-gradient(#00adfe 0 5px,#188ee9 5px,#188ee9 calc(100% - 2px),#0e69f2 calc(100% - 2px));
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px 0 16px;
  border-bottom:2px solid #000;
}
.header-title{
  font-family:Poppins-ExtraBold,sans-serif;
  font-size:28px;
  color:#fff;
  -webkit-text-stroke:4px #000;
  paint-order:stroke;
  text-shadow:0 3px 0 rgba(0,0,0,.35);
  text-transform:uppercase;
}
.close-button{
  width:44px;height:44px;border:3px solid #000;border-radius:10px;
  background:linear-gradient(#ff6679 0 5px,#e62c49 5px);
  color:#fff;font-family:Poppins-ExtraBold;font-size:32px;line-height:1;
  -webkit-text-stroke:3px #000;paint-order:stroke;
  cursor:pointer;box-shadow:inset 0 2px rgba(255,255,255,.35);
}
.close-button:hover{transform:scale(1.04)}
.category-nav{
  height:54px;
  display:flex;
  background:linear-gradient(#353d61 0 3px,#1e2440 3px);
  border-bottom:2px solid #000;
}
.category-button{
  flex:1;border:0;background:transparent;position:relative;cursor:pointer;padding:6px;
}
.category-button.active{
  background:linear-gradient(#353d61 0 3px,#1e2440 3px,#1e2440 43px,#3281ff 43px);
}
.category-button img{
  width:34px;height:34px;object-fit:contain;
  filter:drop-shadow(3px 3px 0 #000);
}
.filter-nav{
  min-height:47px;
  display:flex;align-items:center;justify-content:center;gap:9px;
  padding:5px 8px;
  background:#050913;
  border-bottom:2px solid #000;
  overflow-x:auto;
}
.filter-button{
  width:38px;height:38px;flex:0 0 auto;padding:4px;
  border:2px solid transparent;border-radius:8px;background:transparent;cursor:pointer;
}
.filter-button.active{background:#3281ff;border-color:#000}
.filter-button img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(2px 2px 0 #000)}
.all-filter-label{
  display:grid;
  place-items:center;
  width:100%;
  height:100%;
  color:#fff;
  font-family:Poppins-ExtraBold,sans-serif;
  font-size:12px;
  line-height:1;
  -webkit-text-stroke:2px #000;
  paint-order:stroke;
}

.inventory-body{
  flex:1;min-height:0;
  display:flex;flex-direction:column;
  background:var(--bag-blue);
}
.controls{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 12px 8px;
  border-bottom:2px solid #0e69f2;
  background:#0848a7;
}
.search-wrap{
  flex:1;background:#fff;border:3px solid #000;border-radius:10px;padding:3px;
}
.search-wrap input{
  width:100%;height:34px;border:3px solid #188ee9;border-radius:8px;
  padding:0 10px;font-family:Sen-Bold;font-size:15px;outline:none;color:#151515;
}
.sort-button{
  min-width:112px;height:40px;
  border:2px solid #000;border-radius:9px;
  background:linear-gradient(#80deff 0 4px,#2f94fc 4px);
  color:#fff;font-family:Poppins-ExtraBold;font-size:15px;
  -webkit-text-stroke:2px #000;paint-order:stroke;cursor:pointer;
}
.item-grid{
  flex:1;overflow-y:auto;
  display:grid;
  grid-template-columns:repeat(5,80px);
  grid-auto-rows:112px;
  justify-content:center;
  gap:8px 10px;
  padding:14px 10px 90px;
  scrollbar-width:thin;
  scrollbar-color:#1e90ff #033994;
}
.item-grid::-webkit-scrollbar{width:7px}
.item-grid::-webkit-scrollbar-track{background:#033994}
.item-grid::-webkit-scrollbar-thumb{background:#1e90ff;border-radius:4px}
.item-card{
  border:0;background:transparent;color:#fff;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;padding:0;
}
.equipment-slot{
  width:78px;height:78px;border-radius:9px;position:relative;
  background-size:cover;background-position:center;
  transition:.18s;filter:drop-shadow(0 3px 2px rgba(0,0,0,.35));
}
.item-card:hover .equipment-slot{transform:scale(1.06)}
.item-image-container{position:absolute;inset:0;display:grid;place-items:center}
.item-image{width:78%;height:78%;object-fit:contain}
.blueprint-item{filter:grayscale(100%);opacity:.8}
.blueprint-overlay{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;pointer-events:none}
.slot-badge{
  position:absolute;top:0;left:0;width:25px;height:25px;border-radius:50%;
  display:grid;place-items:center;border:2px solid #000;z-index:3;
}
.slot-badge img{width:19px;height:19px;object-fit:contain}
.item-label{
  width:86px;min-height:28px;
  color:#fff;font-family:Sen-Bold;font-size:11px;line-height:11px;text-align:center;
  -webkit-text-stroke:2px #000;paint-order:stroke;
  display:flex;align-items:flex-start;justify-content:center;
}
.empty-message{
  grid-column:1/-1;align-self:start;
  font-family:Poppins-ExtraBold;font-size:22px;text-align:center;
  -webkit-text-stroke:3px #000;paint-order:stroke;padding-top:50px;
}
.bottom-bar{
  height:68px;background:#1e2440;border-top:3px solid #000;
  display:flex;align-items:center;justify-content:space-evenly;
  position:absolute;left:0;right:0;bottom:0;
}
.bottom-icon{width:48px;height:48px;object-fit:contain;filter:drop-shadow(3px 3px 0 #000);opacity:.9}
.detail-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,.5);
  display:none;align-items:center;justify-content:center;padding:12px;
}
.detail-overlay.open{display:flex}
.item-modal{
  width:min(400px,96vw);
  height:min(650px,92vh);
  background:#e5edf2;
  border-radius:25px;border:3px solid #000;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 10px 28px rgba(0,0,0,.7);
  transform:scale(.8);opacity:0;
  transition:.18s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
.detail-overlay.open .item-modal{transform:scale(1);opacity:1}
.item-modal-header{
  min-height:245px;
  border-top:5px solid rgba(255,255,255,.25);
  display:flex;flex-direction:column;align-items:center;text-align:center;
  padding:12px 55px 12px;
}
.detail-close{
  position:absolute;right:10px;top:10px;z-index:4;
  width:42px;height:42px;border:3px solid #000;border-radius:9px;
  background:linear-gradient(#ff6679 0 5px,#e62c49 5px);
  color:#fff;font-family:Poppins-ExtraBold;font-size:29px;
  -webkit-text-stroke:3px #000;paint-order:stroke;cursor:pointer;
}
.modal-name{
  font-family:Poppins-ExtraBold;font-size:22px;line-height:22px;color:#fff;
  -webkit-text-stroke:4px #000;paint-order:stroke;text-wrap:balance;
}
.modal-rarity{
  margin-top:3px;font-family:Sen-Bold;font-size:14px;text-transform:capitalize;
  text-shadow:0 2px 0 #000;
}
.modal-icon{
  width:92px;height:92px;margin-top:10px;
  background-size:cover;background-position:center;display:grid;place-items:center;
}
.modal-icon img.main{width:78%;height:78%;object-fit:contain}
.modal-icon img.overlay{position:absolute;width:92px;height:92px;object-fit:contain}
.modal-min-level{
  margin-top:6px;font-family:Poppins-ExtraBold;font-size:17px;color:#fff;
  -webkit-text-stroke:3px #000;paint-order:stroke;
}
.level-selector{
  display:flex;gap:5px;flex-wrap:wrap;justify-content:center;
  padding:8px;background:#36364e;border-top:2px solid #000;border-bottom:2px solid #000;
}
.level-button{
  min-width:55px;height:34px;border:2px solid #000;border-radius:8px;
  background:linear-gradient(#77c9ff 0 4px,#2f94fc 4px);
  color:#fff;font-family:Poppins-ExtraBold;font-size:12px;
  -webkit-text-stroke:1.5px #000;paint-order:stroke;cursor:pointer;
}
.level-button.active{background:linear-gradient(#d69aff 0 4px,#a12aff 4px)}
.item-modal-body{
  flex:1;min-height:0;overflow-y:auto;
  padding:14px 18px 22px;background:#e5edf2;color:#222;
  font-family:Sen-Bold;-webkit-text-stroke:0;
}
.description{font-size:16px;line-height:1.25;margin:0 0 13px}
.section-title{
  font-family:Poppins-ExtraBold;font-size:15px;margin:13px 0 6px;color:#111;
}
.stat-row,.ability-row{
  font-size:15px;margin:3px 0;display:flex;gap:7px;align-items:flex-start;
}
.ability-row::before{content:"+";font-family:Poppins-ExtraBold}
.ability-row{font-weight:700}
.info-dot{
  display:inline-grid;place-items:center;width:18px;height:18px;border-radius:50%;
  background:#007acc;color:#fff;font-family:Poppins-ExtraBold;font-size:12px;
}
.resource-row{
  display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;
}
.resource-chip{
  background:#36364e;color:#fff;border:2px solid #000;border-radius:9px;
  padding:5px 8px;font-size:12px;
}
.farm-row{
  background:#181725;color:#fff;border-radius:10px;border:2px solid #000;
  padding:9px 10px;margin:7px 0;font-size:13px;
}
.farm-row strong{color:#fff}
.farm-chance{color:#ffe100;font-family:Poppins-ExtraBold}
.note{
  color:#666;font-size:11px;line-height:1.2;margin-top:9px;
}
@media(max-width:520px){
  .page{padding:0}

function esc(value) {
  return String(value ?? "").replace(/[&<>"']/g, ch => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[ch]));
}
function equipBg(rarity) { return `${BASE}/assets/ui/equip_bg_${rarity}.png`; }
function itemIcon(asset) { return `${BASE}/assets/ui/item-icons/${asset}.png`; }
function blueprintOverlay() { return `${BASE}/assets/ui/blueprint_icon_overlay.png`; }

function drawFilters() {
  filters.innerHTML = "";
  if (mode === "blueprint") {
    const btn = document.createElement("button");
    btn.className = "filter-button active";
    btn.innerHTML = `<img src="${BASE}/assets/ui/inventory/PictoIcon_Blueprint.png" alt="Blueprint">`;
    filters.appendChild(btn);
    return;
  }
  slots.forEach(slot => {
    const button = document.createElement("button");
    button.className = "filter-button" + (slot === selectedSlot ? " active" : "");
    button.title = slot;
    button.dataset.slot = slot;
    button.innerHTML = slot === "All"
      ? `<span class="all-filter-label">ALL</span>`
      : `<img src="${BASE}/assets/ui/${slotIcon[slot]}" alt="${slot}">`;
    button.addEventListener("click", () => {
      selectedSlot = slot;
      drawFilters();
      renderGrid();
    });
    filters.appendChild(button);
  });
}

function filteredData() {
  const q = search.value.trim().toLowerCase();
  let rows = DATA.filter(item => mode === "blueprint" ? item.isBlueprint : !item.isBlueprint);
  if (mode === "equipment" && selectedSlot !== "All") rows = rows.filter(item => item.slot === selectedSlot);
  if (q) rows = rows.filter(item => JSON.stringify(item).toLowerCase().includes(q));

  if (sortMode === "name") rows.sort((a,b) => a.name.localeCompare(b.name));
  else if (sortMode === "level") rows.sort((a,b) => (a.levels[0]?.requiredLevel || 0) - (b.levels[0]?.requiredLevel || 0));
  else if (sortMode === "rarity") {
    const order = {mythic:0,legendary:1,epic:2,rare:3,uncommon:4,common:5};
    rows.sort((a,b) => order[a.rarity] - order[b.rarity]);
  }
  return rows;
}

function renderGrid() {
  const rows = filteredData();
  if (!rows.length) {
    grid.innerHTML = `<div class="empty-message">No items found</div>`;
    return;
  }
  grid.innerHTML = rows.map((item, index) => {
    const badge = item.slot !== "Blueprint"
      ? `<span class="slot-badge" style="background:${rarityBadge[item.rarity]}"><img src="${BASE}/assets/ui/${slotBadge[item.slot]}" alt=""></span>`
      : "";
    const bp = item.isBlueprint ? " blueprint-item" : "";
    const overlayImg = item.isBlueprint
      ? `<img class="blueprint-overlay" src="${blueprintOverlay()}" alt="">`
      : "";
    return `
      <button class="item-card" data-index="${DATA.indexOf(item)}" title="${esc(item.name)}">
        <span class="equipment-slot" style="background-image:url('${equipBg(item.rarity)}')">
          ${badge}
          <span class="item-image-container">
            <img class="item-image${bp}" src="${itemIcon(item.iconAsset)}" alt="${esc(item.name)}">
            ${overlayImg}
          </span>
        </span>
        <span class="item-label">${esc(item.name)}</span>
      </button>`;
  }).join("");

  grid.querySelectorAll(".item-card").forEach(card => {
    card.addEventListener("click", () => openItem(DATA[Number(card.dataset.index)]));
  });
}

function levelLabel(name, index, total) {
  const match = name.match(/(?:Lvl|Lv)\s*(\d+)/i);
  if (match) return `Lvl ${match[1]}`;
  if (/Ultimate/i.test(name)) return "Ultimate";
  if (/Blueprint:/i.test(name)) return "Blueprint";
  return total === 1 ? "Base" : `Level ${index + 1}`;
}

    ${abilities}
    ${upgrades}
    ${farm}
    <div class="section-title">Sell Price</div>
    <div class="stat-row"><strong>${level.sellPrice}</strong> coins</div>
    <p class="note">Boss names use their player-facing in-game names. Drop percentages are conditional within the named loot pool; mission or event wrapper chances may make the overall per-run probability lower.</p>
  `;
}

function openItem(item) {
  selectedFamily = item;
  selectedLevel = 0;
  renderModal();
  overlay.classList.add("open");
}

function closeItem() { overlay.classList.remove("open"); }

document.querySelectorAll(".category-button").forEach(button => {
  button.addEventListener("click", () => {
    mode = button.dataset.mode;
    document.querySelectorAll(".category-button").forEach(b => b.classList.toggle("active", b === button));
    selectedSlot = "All";
    drawFilters();
    renderGrid();
  });
});

search.addEventListener("input", renderGrid);
sortButton.addEventListener("click", () => {
  const sequence = ["new","rarity","name","level"];
  sortMode = sequence[(sequence.indexOf(sortMode) + 1) % sequence.length];
  sortButton.textContent = {
    new:"Sort: New", rarity:"Sort: Rarity", name:"Sort: A-Z", level:"Sort: Level"
  }[sortMode];
  renderGrid();
});

document.getElementById("detailClose").addEventListener("click", closeItem);
overlay.addEventListener("click", event => { if (event.target === overlay) closeItem(); });
document.addEventListener("keydown", event => { if (event.key === "Escape") closeItem(); });

document.getElementById("minimizeButton").addEventListener("click", () => {
  const shell = document.getElementById("inventoryShell");
  shell.classList.toggle("minimized");
  document.getElementById("minimizeButton").textContent = shell.classList.contains("minimized") ? "+" : "X";
});

drawFilters();
renderGrid();
</script>
</body>
</html>
